# gasolineras — app ONLY, behind your EXISTING Caddy (the one already serving
# other apps). No second Caddy here: your current Caddy becomes the shared edge
# and reverse-proxies to this container by name over a shared Docker network.
#
# Steps:
#   1) Find the Docker network your Caddy is on:
#        docker inspect <caddy-container> \
#          --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}'
#   2) Put that network name in .env as PROXY_NETWORK
#   3) docker compose -f docker-compose.shared.yml up -d
#   4) Add to your Caddyfile:
#        gasolineras.ojoalprecio.com {
#            reverse_proxy gasolineras:80
#        }
#      Then reload Caddy:
#        docker exec <caddy-container> caddy reload --config /etc/caddy/Caddyfile

services:
  gasolineras:
    image: ghcr.io/davic80/gasolineras:${GASOLINERAS_TAG:-latest}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      proxy:
        aliases:
          - gasolineras

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:?set PROXY_NETWORK in .env to your existing Caddy network}
